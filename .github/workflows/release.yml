name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "live-recorder-windows" ^
            --add-data "gui;gui" ^
            --add-data "core;core" ^
            --add-data "platforms;platforms" ^
            --add-data "recorder;recorder" ^
            --add-data "notify;notify" ^
            --add-data "utils;utils" ^
            --add-data "wechat;wechat" ^
            --add-data "config.json;." ^
            --hidden-import ttkbootstrap ^
            --hidden-import pystray ^
            --hidden-import PIL ^
            --hidden-import aiohttp ^
            --hidden-import cryptography ^
            main.py
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/live-recorder-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "live-recorder-linux" \
            --add-data "gui:gui" \
            --add-data "core:core" \
            --add-data "platforms:platforms" \
            --add-data "recorder:recorder" \
            --add-data "notify:notify" \
            --add-data "utils:utils" \
            --add-data "wechat:wechat" \
            --add-data "config.json:." \
            --hidden-import ttkbootstrap \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import aiohttp \
            --hidden-import cryptography \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/live-recorder-linux

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "live-recorder-macos" \
            --add-data "gui:gui" \
            --add-data "core:core" \
            --add-data "platforms:platforms" \
            --add-data "recorder:recorder" \
            --add-data "notify:notify" \
            --add-data "utils:utils" \
            --add-data "wechat:wechat" \
            --add-data "config.json:." \
            --hidden-import ttkbootstrap \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import aiohttp \
            --hidden-import cryptography \
            main.py

      - name: Ad-hoc sign (reduces Gatekeeper warnings)
        run: codesign --deep --force --sign - dist/live-recorder-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/live-recorder-macos

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/*
            artifacts/linux-build/*
            artifacts/macos-build/*
          generate_release_notes: true
          draft: false
          prerelease: false
