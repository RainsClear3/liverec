name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - os: windows-latest
            platform: windows
            arch: x64
            artifact: live-recorder-windows-x64.exe
            shell: cmd
          - os: windows-arm64
            platform: windows
            arch: arm64
            artifact: live-recorder-windows-arm64.exe
            shell: cmd
          # ── Linux ──
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: live-recorder-linux-x64
            shell: bash
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact: live-recorder-linux-arm64
            shell: bash
          # ── macOS ──
          - os: macos-13
            platform: macos
            arch: x64
            artifact: live-recorder-macos-x64
            shell: bash
          - os: macos-latest
            platform: macos
            arch: arm64
            artifact: live-recorder-macos-arm64
            shell: bash

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Linux: system deps ──
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ffmpeg

      # ── Dependencies ──
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── Windows build ──
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "${{ matrix.artifact }}" ^
            --add-data "gui;gui" ^
            --add-data "core;core" ^
            --add-data "platforms;platforms" ^
            --add-data "recorder;recorder" ^
            --add-data "notify;notify" ^
            --add-data "utils;utils" ^
            --add-data "wechat;wechat" ^
            --add-data "config.json;." ^
            --hidden-import ttkbootstrap ^
            --hidden-import pystray ^
            --hidden-import PIL ^
            --hidden-import aiohttp ^
            --hidden-import cryptography ^
            main.py
        shell: cmd

      # ── Linux / macOS build ──
      - name: Build (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "${{ matrix.artifact }}" \
            --add-data "gui:gui" \
            --add-data "core:core" \
            --add-data "platforms:platforms" \
            --add-data "recorder:recorder" \
            --add-data "notify:notify" \
            --add-data "utils:utils" \
            --add-data "wechat:wechat" \
            --add-data "config.json:." \
            --hidden-import ttkbootstrap \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import aiohttp \
            --hidden-import cryptography \
            main.py
        shell: bash

      # ── macOS ad-hoc sign ──
      - name: Ad-hoc sign (macOS)
        if: matrix.platform == 'macos'
        run: codesign --deep --force --sign - "dist/${{ matrix.artifact }}"

      # ── Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
