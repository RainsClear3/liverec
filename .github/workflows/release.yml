name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 ──
          - os: windows-latest
            platform: windows
            arch: x64
            artifact: live-recorder-windows-x64.exe
            shell: cmd

          # ── Windows x86 (32-bit) ──
          - os: windows-latest
            platform: windows
            arch: x86
            artifact: live-recorder-windows-x86.exe
            shell: cmd
            win32: true

          # ── Linux x64 ──
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: live-recorder-linux-x64
            shell: bash

          # ── Linux arm64 (树莓派 4/5) ──
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact: live-recorder-linux-arm64
            shell: bash
            use_qemu: true

          # ── macOS Apple Silicon ──
          - os: macos-14
            platform: macos
            arch: arm64
            artifact: live-recorder-macos-arm64
            shell: bash

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      # ── Linux arm64: QEMU ──
      - name: Set up QEMU (Linux arm64)
        if: matrix.use_qemu
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          run: |
            apt-get update && apt-get install -y python3-pip python3-tk ffmpeg
            pip3 install -r requirements.txt
            pip3 install pyinstaller
            pyinstaller --noconfirm --onefile --windowed \
              --name "${{ matrix.artifact }}" \
              --add-data "gui:gui" \
              --add-data "core:core" \
              --add-data "platforms:platforms" \
              --add-data "recorder:recorder" \
              --add-data "notify:notify" \
              --add-data "utils:utils" \
              --add-data "wechat:wechat" \
              --add-data "config.json:." \
              --hidden-import ttkbootstrap \
              --hidden-import pystray \
              --hidden-import PIL \
              --hidden-import aiohttp \
              --hidden-import cryptography \
              main.py

      - name: Upload artifact (Linux arm64)
        if: matrix.use_qemu
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.artifact }}

      # ── Standard builds ──
      - name: Set up Python
        if: ${{ !matrix.use_qemu }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.win32 && 'x86' || 'x64' }}

      - name: Install system dependencies (Linux)
        if: ${{ !matrix.use_qemu && matrix.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ffmpeg

      - name: Install Python dependencies
        if: ${{ !matrix.use_qemu }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (Windows)
        if: ${{ !matrix.use_qemu && matrix.platform == 'windows' }}
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "${{ matrix.artifact }}" ^
            --add-data "gui;gui" ^
            --add-data "core;core" ^
            --add-data "platforms;platforms" ^
            --add-data "recorder;recorder" ^
            --add-data "notify;notify" ^
            --add-data "utils;utils" ^
            --add-data "wechat;wechat" ^
            --add-data "config.json;." ^
            --hidden-import ttkbootstrap ^
            --hidden-import pystray ^
            --hidden-import PIL ^
            --hidden-import aiohttp ^
            --hidden-import cryptography ^
            main.py
        shell: cmd

      - name: Build (Linux/macOS)
        if: ${{ !matrix.use_qemu && matrix.platform != 'windows' }}
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "${{ matrix.artifact }}" \
            --add-data "gui:gui" \
            --add-data "core:core" \
            --add-data "platforms:platforms" \
            --add-data "recorder:recorder" \
            --add-data "notify:notify" \
            --add-data "utils:utils" \
            --add-data "wechat:wechat" \
            --add-data "config.json:." \
            --hidden-import ttkbootstrap \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import aiohttp \
            --hidden-import cryptography \
            main.py
        shell: bash

      - name: Ad-hoc sign (macOS)
        if: ${{ !matrix.use_qemu && matrix.platform == 'macos' }}
        run: codesign --deep --force --sign - "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        if: ${{ !matrix.use_qemu }}
        uses: actions/upload-artifact@v4
        with:
            name: build-${{ matrix.platform }}-${{ matrix.arch }}
            path: dist/${{ matrix.artifact }}

  # ── macOS Intel: 独立 job，不阻塞 Release ──
  build-macos-intel:
    runs-on: macos-13
    name: macos (x64)
    # 允许排队超时不阻塞整个 workflow
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "live-recorder-macos-x64" \
            --add-data "gui:gui" \
            --add-data "core:core" \
            --add-data "platforms:platforms" \
            --add-data "recorder:recorder" \
            --add-data "notify:notify" \
            --add-data "utils:utils" \
            --add-data "wechat:wechat" \
            --add-data "config.json:." \
            --hidden-import ttkbootstrap \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import aiohttp \
            --hidden-import cryptography \
            main.py

      - name: Ad-hoc sign
        run: codesign --deep --force --sign - dist/live-recorder-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-x64
          path: dist/live-recorder-macos-x64

  # ── Release: 只依赖主 build job，不等 macOS Intel ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download main artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*

      - name: Download macOS Intel (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-macos-x64
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
